; ============================================================
;  VideoBatchEncoder.ini - 動画一括エンコードツール 設定ファイル
;  このファイルを VideoBatchEncoder.exe と同じフォルダに配置。
;  変更した設定は次回実行時から反映されます。
;  行頭に ; または # を付けるとコメント（無効化）になります。
; ============================================================

[ffmpeg]
; FFmpeg 実行ファイルのフルパス
Path=C:\ffmpeg\bin\ffmpeg.exe

[input]
; 処理対象とする拡張子（カンマ区切り、フォルダ投入時に適用）
; ファイル直接投入時は拡張子によるフィルタは行わず ffmpeg で判定する
Extensions=avi,mov,mkv,mp4,m4v,wmv,flv,ts,mts,m2ts,mpeg,mpg,webm

[video]
; ── エンコーダー ──────────────────────────────────────────
; デフォルト: H.265 (hevc_nvenc) — 同品質でH.264より約30〜40%小さいファイルサイズ
;   ※ 古い機器・再生ソフトでは非対応の場合あり（DaVinci Resolveは問題なし）
Codec=hevc_nvenc

; H.264 を使う場合は上の行をコメントアウトし、以下のコメントを外してください
;Codec=h264_nvenc

; CPUエンコード（GPU不要・互換性最優先、エンコード速度は遅い）を使う場合:
;Codec=libx264
;Codec=libx265

; ── プリセット ────────────────────────────────────────────
; NVENC: p1=最速・低品質 ～ p7=最遅・高品質
; libx264/libx265: ultrafast, superfast, veryfast, faster, fast, medium, slow, slower, veryslow
Preset=p4

; ── チューニング（NVENCのみ有効。libx264/libx265では無視されます） ──
; hq=高画質 / ll=低遅延 / ull=超低遅延 / lossless=ロスレス
Tune=hq

; ── 品質値 ────────────────────────────────────────────────
; NVENC使用時は -cq、libx264/libx265使用時は -crf として適用されます
;   H.265(hevc_nvenc)推奨値 : 20（H.264相当の画質を保ちつつ小容量）
;   H.264(h264_nvenc)推奨値 : 17
;   libx264/libx265推奨値   : 18〜23
CQ=20

; H.264 (h264_nvenc) を使う場合の推奨値（上のCQ=20をコメントアウトして使用）
;CQ=17

; ── レート制御モード（NVENCのみ有効） ────────────────────
; vbr=可変ビットレート / cbr=固定ビットレート / constqp=固定量子化
RateControl=vbr

; ── ピクセルフォーマット ──────────────────────────────────
; yuv420p推奨（広い互換性）。空欄にすると指定なし（コーデックのデフォルトに従う）
PixelFormat=yuv420p

; ── MP4メタデータ配置フラグ ───────────────────────────────
; +faststart: 先頭にメタデータを配置（ストリーミング・プレビューに有利）
; 空欄にすると指定なし
MovFlags=+faststart

[audio]
; オーディオエンコーダー
Codec=aac

; オーディオビットレート
Bitrate=192k

[output]
; 入力と出力の Duration（尺）の差がこの秒数を超えた場合に WARN と判定する
; 厳しめ: 1.0（推奨） / ゆるめ: 3.0 / 無効化は大きな値（例: 9999）を設定
DurationTolerance=1.0

[retry]
; ── 自動リトライ機能 ──────────────────────────────────────
; FAILになったファイルを自動的に再試行します。
; デフォルトは無効（MaxRetry=0）。有効にする場合は数値を1以上に変更してください。
;MaxRetry=3
;RetryDelay=5

; ── リトライ時の設定変更（オプション） ────────────────────
; 既定では「同じ設定で単純に繰り返す」だけです（推奨）。
; リトライごとに設定を変えたい場合のみ、以下のコメントを外してください。
; RetryN_Preset  : N回目のリトライで使うプリセット
; RetryN_Options : N回目のリトライで追加するffmpegオプション（スペース区切り）
; RetryN_Codec   : N回目のリトライで使うコーデック（GPU問題時にCPUへ切替える等）
;
;Retry1_Preset=p2
;Retry2_Options=-err_detect ignore_err
;Retry3_Codec=libx264

[secondpass]
; ── 第2パス: WARNファイルの自動再チャレンジ ──────────────
; 第1パス（全件処理）完了後、WARN判定になったファイルだけを対象に
; 自動で再エンコードを試みます（GPU負荷スパイクや一時的な書き込み遅延などの
; 偶発的エラーからの自動回復を狙う機能）。
; デフォルトは無効です。
;Enabled=true
;MaxRetry=3

[session]
; ── セッション・レジューム機能 ────────────────────────────
; バッチ処理の進捗を encode_session_*.json として保存し、
; 強制終了やクラッシュ後に未処理ファイルから再開できるようにします。
; デフォルトは有効（true）です。無効にする場合のみ false に変更してください。
ResumeEnabled=true

; セッションJSONの保存先フォルダ（空欄 = ログ出力先と同じフォルダを使用）
;SessionDir=

[ui]
; ── コンソール表示モード ──────────────────────────────────
; true  : カーソル制御による同一行上書き表示（通常のインタラクティブ端末向け）
; false : 改行のみのシンプルなスクロール表示
;         CI/CDのログ監視やカーソル制御非対応のシェルで実行する場合はこちらを推奨
InteractiveUI=true
